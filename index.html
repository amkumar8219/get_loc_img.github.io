l<!DOCTYPE html>
<html>
<head>
  <title>Thank you for visiting payment upload site. Please allow required permissions.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>QR Upload </h2>

<button onclick="getLocation()">Browse</button>
<p id="location"></p>

<br><br>

<button onclick="capturePhoto()">Upload</button>
<br><br>

<canvas id="canvas" width="300" height="225"></canvas>

<script>

/* GEO LOCATION */
function getLocation() {
  navigator.geolocation.getCurrentPosition(
    pos => {
      document.getElementById("location").innerText =
        `Latitude: ${pos.coords.latitude}, Longitude: ${pos.coords.longitude}`;
    },
    err => alert("Location permission denied")
  );
}

/* CAMERA – NO STREAM DISPLAY */
async function capturePhoto() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" }
    });

    const video = document.createElement("video");
    video.srcObject = stream;
    video.play();

    video.onloadedmetadata = () => {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      ctx.drawImage(video, 0, 0, 300, 225);

      // STOP CAMERA immediately after capture
      stream.getTracks().forEach(track => track.stop());
    };

  } catch (error) {
    alert("Camera permission denied.");
  }
}

</script>

</body>
</html>
